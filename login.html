<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">

        <!-- ligne importante pour les mobiles -->
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Connexion</title>

        <!-- Bootstrap (le visuel) -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

        <!-- JQuery (pour AJAX) -->
        <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

        <!-- Fichier css perso -->
        <link rel="stylesheet" href="css/style.css">
    </head>
    <body class="bg-light"> <!-- fond gris clair -->

        <div class="container mt-5"> <!-- centre le contenu et marge en haut -->
            <div class="card shadow p-4 mx-auto" style="max-width: 500px;">

                <h2 class="text-center mb-4">Connexion</h2>

                    <!-- Formulaire ou on encode le login et le mdp -->
                    <form id="form_login">

                        <div class="mb-3">
                            <label class="form-label">Login</label>
                            <input type="text" name="login" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Mot de passe</label>
                            <input type="password" name="mdp" class="form-control" required>
                        </div>

                        <button type="submit" class="btn btn-primary w-100">Se connecter</button>
                    </form>

                <!-- Zone d'écriture pour un message -->
                <p id="message" class="text-center mt-3 fw-bold"></p>
            </div>
        </div>

        <script src="js/login.js"></script>
    </body>
</html>
