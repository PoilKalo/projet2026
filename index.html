<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">

        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Acceuil</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

        <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

        <link rel="stylesheet" href="css/style.css">
    </head>

    <body class="bg-light">

        <!-- 
        Barre de navigation :
        - navbar-expand-lg = menu horizontal sur grand écran, replié sur mobile -->
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary">

            <div class="container">

                <!-- navbar-brand = titre du site -->
                <a class="navbar-brand" href="index.html">Gestion d'objets</a>

                <!-- bouton de menu mobile -->
                <button class="navbar-toggler" type="button"
                        data-bs-toggle="collapse"
                        data-bs-target="#menuPrincipal">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <!-- collapse navbar-collapse = partie du menu qui se replie -->
                <div class="collapse navbar-collapse" id="menuPrincipal">

                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">

                        <!-- nav-item = élément du menu -->
                        <!-- nav-link = style du lien -->
                        <li class="nav-item">
                            <a class="nav-link" href="#" id="btnObjet">Objets</a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link" href="#" id="btnCategories">Catégories</a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link" href="#" id="btnSites">Sites</a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link" href="#" id="btnLocaux">Locaux</a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link" href="#" id="btnRangements">Rangements</a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link" href="#" id="btnNiveaux">Niveaux</a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link" href="#" id="btnAjouterObjet">Ajouter un objet</a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link" href="#" id="btnPrets">Prêts</a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link d-none" href="#" id="btnAdmin">Administration</a>
                        </li>
                    </ul>

                    <!-- btn = style bouton -->
                    <!-- btn-outline-light = bouton blanc contour -->
                    <button class="btn btn-outline-light" id="btnLogout">Se déconnecter</button>
                </div>
            </div>
        </nav>

        <!-- ================= -->
        <!-- CONTENU PRINCIPAL -->
        <!-- ================= -->
        <div class="container mt-5">

            <div id="globalMessage" class="text-center fw-bold mb-3"></div>
            <!-- card = bloc stylé, shadow = ombre, p-4 = padding intérieure -->
            <div class="card shadow p-4">
                <h1 class="text-center mb-3">Bienvenue</h1>
                <p id="userInfo" class="text-center fw-bold"></p> <!-- sera remplis avec mon JS -->

                <!-- Texte explicatif pour l'user -->
                <p class="text-center">Utilisez le menu pour gérer vos objets, leurs emplacements et les prêts.</p>
            </div>

            <div id="contenu" class="mt-4"></div>
        </div>

        <!-- Scripts -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script src="js/index.js"></script> <!-- mon js -->
    </body>
</html>
